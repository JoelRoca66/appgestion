<p-toast position="top-center"></p-toast>

<div class="flex align-items-center justify-content-center min-h-screen surface-ground">
   <div class="w-full md:w-5 lg:w-4 xl:w-3 p-4">
       </div>
</div>
<div class="flex align-items-center justify-content-center min-h-screen surface-ground">
    <div class="w-full md:w-5 lg:w-4 xl:w-3 p-4">

        <p-card styleClass="shadow-4 border-round-lg">
            <div class="text-center mb-5">
                <i class="pi pi-briefcase text-4xl text-primary mb-3"></i>
                <div class="text-900 text-3xl font-medium mb-3">Bienvenido</div>
                <span class="text-600 font-medium">Inicia sesión en AppGestión</span>
            </div>

            <div class="flex flex-column gap-3">

                <p-floatLabel>
                    <input pInputText id="username" [(ngModel)]="usuario" class="w-full" />
                    <label for="username">Usuario</label>
                </p-floatLabel>

                <p-floatLabel>
                    <p-password id="password" [(ngModel)]="password" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full" inputStyleClass="w-full">
                    </p-password>
                    <label for="password">Contraseña</label>
                </p-floatLabel>

                <div class="flex align-items-center justify-content-between mb-2">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox [(ngModel)]="recordar" [binary]="true" inputId="remember"></p-checkbox>
                        <label for="remember" class="text-600 cursor-pointer">Recordarme</label>
                    </div>
                    <a routerLink="/" class="text-primary no-underline cursor-pointer hover:underline text-sm">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <p-button label="Entrar" icon="pi pi-sign-in" styleClass="w-full" [loading]="loading"
                    (onClick)="onLogin()">
                </p-button>
            </div>
        </p-card>

    </div>
</div>

<p-dialog [(visible)]="passwordDialog" [style]="{ width: '450px' }" [header]="dialogTitle" [modal]="true"
    styleClass="p-fluid" [draggable]="false" [resizable]="false" [contentStyle]="{'overflow': 'visible'}">

    <ng-template pTemplate="content">

        <h3>Es la primera vez que inicias sesión, cambia la contraseña.</h3>
        <div class="formgrid grid">
            <div class="field col-6 flex flex-column gap-2">
                <label for="contrasena" class="font-bold">Contraseña</label>
                <p-password id="contrasena" [(ngModel)]="user.contrasena" [toggleMask]="true" [feedback]="true"
                    promptLabel="Introduce contraseña" weakLabel="Débil" mediumLabel="Media" strongLabel="Fuerte"
                    [style]="{'width':'100%'}" inputStyleClass="w-full" required>
                </p-password>
                <small class="p-error block" *ngIf="submitted && !user.contrasena">Requerido.</small>
            </div>

            <div class="field col-6 flex flex-column gap-2">
                <label for="confirmarContrasena" class="font-bold">Confirmar Contraseña</label>
                <p-password id="confirmarContrasena" [(ngModel)]="confirmPassword" [toggleMask]="true"
                    [feedback]="false" [style]="{'width':'100%'}" inputStyleClass="w-full">
                </p-password>
                <small class="p-error block"
                    *ngIf="submitted && user.contrasena && confirmPassword && user.contrasena !== confirmPassword">
                    Las contraseñas no coinciden.
                </small>
            </div>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
            (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text"
            (click)="savePassword()"></button>
    </ng-template>
</p-dialog>
