<div class="grid">

  <div class="col-12">
    <p-card>
      <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center">
          <h2 class="m-1 mt-3 ml-3">{{ proyecto?.nombre }}</h2>
          <p-tag
            [value]="proyecto?.estado"
            class="mt-3 mr-3">
          </p-tag>
        </div>
      </ng-template>

      <div class="grid mt-3">
        <div class="col-12 md:col-6">
          <p><strong>Descripción</strong></p>
          <p class="text-color-secondary">{{ proyecto?.descripcion }}</p>
        </div>

        <div class="col-12 md:col-6">
          <div class="flex flex-column gap-2">
            <span><strong>Inicio:</strong> {{ proyecto?.fecha_ini | date:'dd/MM/yyyy' }}</span>
            <span><strong>Fin:</strong> {{ proyecto?.fecha_fin | date:'dd/MM/yyyy' }}</span>
            <span><strong>Margen:</strong> {{ proyecto?.margen_beneficio }}%</span>
          </div>
        </div>
      </div>
    </p-card>
  </div>

  <div class="col-12">
    <p-card>
      <ng-template pTemplate="header">
        <h3 class="m-0 pt-3 ml-3">Tareas del Proyecto</h3>
      </ng-template>

      <p-tree
        [value]="taskTree"
        [lazy]="true"
        selectionMode="single"
        (onNodeExpand)="onNodeExpand($event)"
        class="w-full">
      </p-tree>
    </p-card>
  </div>

</div>
