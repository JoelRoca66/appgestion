<div class="grid">
    
    <div class="col-12 md:col-6 lg:col-3">
        <div class="surface-card shadow-2 p-3 border-round">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">Trabajadores</span>
                    <div class="text-900 font-medium text-xl">15</div>
                </div>
                <div class="flex align-items-center justify-content-center bg-blue-100 border-round" style="width:2.5rem;height:2.5rem">
                    <i class="pi pi-users text-blue-500 text-xl"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 md:col-6 lg:col-3">
        <div class="surface-card shadow-2 p-3 border-round">
            <div class="flex justify-content-between mb-3">
                <div>
                    <span class="block text-500 font-medium mb-3">Proyectos</span>
                    <div class="text-900 font-medium text-xl">4</div>
                </div>
                <div class="flex align-items-center justify-content-center bg-orange-100 border-round" style="width:2.5rem;height:2.5rem">
                    <i class="pi pi-folder text-orange-500 text-xl"></i>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-12">
        <div class="card shadow-2 border-round p-4 surface-card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h3 class="m-0">Gestión de Usuarios</h3>
                <p-button label="Nuevo Usuario" icon="pi pi-plus" size="small"></p-button>
            </div>

            <p-table [value]="users" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-user>
                    <tr>
                        <td>{{ user.worker.nombre }} {{ user.worker.apellido }}</td>
                        <td>{{ user.usuario }}</td>
                        <td>
                            <i class="pi" [ngClass]="user.isAdmin ? 'pi-lock text-primary' : 'pi-user text-500'"></i>
                            {{ user.isAdmin ? 'Admin' : 'Usuario' }}
                        </td>
                        <td>{{ user.worker.categoria?.nombre }}</td>
                        <td>
                            <p-tag [value]="user.worker.estado" [severity]="getSeverity(user.worker.estado)"></p-tag>
                        </td>
                        <td>
                            <p-button icon="pi pi-pencil" [text]="true" [rounded]="true" severity="secondary"></p-button>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
