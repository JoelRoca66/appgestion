<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="grid">
    <div class="col-12">
        <div class="card shadow-2 border-round p-4 surface-card">

            <p-table #dt [value]="categorias" [lazy]="true" (onLazyLoad)="loadCategories($event)"
                [totalRecords]="totalRecords" [loading]="loading" [rows]="10" [paginator]="true"
                [rowsPerPageOptions]="[5, 10, 20]" [tableStyle]="{ 'min-width': '50rem' }"
                styleClass="p-datatable-striped" dataKey="id">

                <ng-template pTemplate="caption">
                    <div class="flex align-items-center justify-content-between flex-wrap gap-2">
                        <h3 class="m-0 text-900 font-bold">Gestión de Categorías</h3>

                        <div class="flex gap-2 align-items-center">
                            <span class="p-input-icon-left" style="position: relative; display: block;">

                                <i class="pi pi-search"
                                    style="position: absolute; top: 50%; left: 1rem; transform: translateY(-50%); color: var(--text-color-secondary);">
                                </i>

                                <input pInputText type="text" (input)="onSearch($event)"
                                    placeholder="Buscar por nombre..." style="padding-left: 3rem; width: 100%;" />
                            </span>

                            <p-button label="Nueva" icon="pi pi-plus" severity="success" (click)="openNew()">
                            </p-button>
                        </div>
                    </div>
                </ng-template>

                <ng-template pTemplate="header">
                    <tr>
                        <th style="width:30%">Nombre</th>
                        <th style="width:25%">P. Trabajador</th>
                        <th style="width:25%">P. Coste</th>
                        <th style="width:20%">Acciones</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-cat>
                    <tr>
                        <td><span class="font-bold">{{ cat.nombre }}</span></td>

                        <td>{{ cat.precio_hora_trabajador | number:'1.2-2' }} €/h</td>

                        <td>{{ cat.precio_hora_coste | number:'1.2-2' }} €/h</td>
                        <td>
                            <div class="flex gap-2">
                                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info"
                                    (onClick)="editCategory(cat)"></p-button>
                                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                                    (onClick)="deleteCategory(cat)"></p-button>
                            </div>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<p-dialog [(visible)]="categoryDialog" [style]="{ width: '450px' }" [header]="dialogTitle" [modal]="true"
    styleClass="p-fluid">

    <ng-template pTemplate="content">
        <div class="field mb-4">
            <label for="nombre" class="font-bold">Nombre</label>
            <input type="text" pInputText id="nombre" [(ngModel)]="category.nombre" required autofocus />
            <small class="p-error block mt-1" *ngIf="submitted && !category.nombre">El nombre es obligatorio.</small>
        </div>

        <div class="formgrid grid">
            <div class="field col">
                <label for="precioTrabajador" class="font-bold">Precio Trabajador</label>
                <p-inputNumber id="precioTrabajador" [(ngModel)]="category.precio_hora_trabajador" mode="currency"
                    currency="EUR" locale="es-ES">
                </p-inputNumber>
            </div>

            <div class="field col">
                <label for="precioCoste" class="font-bold">Precio Coste</label>
                <p-inputNumber id="precioCoste" [(ngModel)]="category.precio_hora_coste" mode="currency" currency="EUR"
                    locale="es-ES">
                </p-inputNumber>
            </div>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
            (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text"
            (click)="saveCategory()"></button>
    </ng-template>
</p-dialog>
