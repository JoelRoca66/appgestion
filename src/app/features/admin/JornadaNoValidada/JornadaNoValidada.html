<p-toast></p-toast>
<p-confirmDialog appendTo="body"></p-confirmDialog>

<h3 class="m-0 text-900 font-bold mb-4">Jornadas No Validadas</h3>
<p-table
  #dt
  [value]="records"
  [lazy]="true"
  (onLazyLoad)="loadRecords($event)"
  [totalRecords]="totalRecords"
  [loading]="loading"
  [rows]="10"
  [paginator]="true"
  [rowsPerPageOptions]="[5,10,20]"
  [tableStyle]="{ 'min-width': '60rem' }"
  styleClass="p-datatable-striped"
  dataKey="id"
>
  <ng-template pTemplate="header">
    <tr>
      <th style="width:15%">Fecha</th>
      <th style="width:10%">Horas</th>
      <th style="width:30%">Tarea</th>
      <th style="width:25%">Usuario</th>
      <th style="width:20%; text-align:center">Acciones</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-r>
    <tr>
      <td>{{ r.fecha | date:'dd/MM/yyyy' }}</td>
      <td><span class="font-bold">{{ r.horas }} h</span></td>
      <td><i class="pi pi-check-square mr-2 text-500"></i>{{ r.id_tarea?.nombre }}</td>
      <td><i class="pi pi-user mr-2 text-500"></i>{{ r.id_trabajador?.dni }}</td>
      <td class="text-center">
        <div class="flex gap-2 justify-content-center">
          <p-button
            icon="pi pi-check-circle"
            [rounded]="true"
            [text]="true"
            severity="success"
            pTooltip="Validar jornada"
            tooltipPosition="bottom"
            (click)="confirmarAccion('validar', r)"
          ></p-button>

          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="info"
            pTooltip="Editar jornada"
            tooltipPosition="bottom"
            (click)="editRecord(r)"
          ></p-button>

          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            pTooltip="Eliminar jornada"
            tooltipPosition="bottom"
            (click)="confirmarAccion('eliminar', r)"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="recordDialog" [style]="{ width: '500px' }" header="Editar Imputación" [modal]="true"
    styleClass="p-fluid" [draggable]="false" [resizable]="false">

    <ng-template pTemplate="content">
        <div class="flex flex-column gap-3 pt-1">

            <div class="formgrid grid">
                <label for="proyecto" class="font-bold">Proyecto Asociado</label>
              <p-select id="proyecto" [options]="projects" [(ngModel)]="selectedProjectId"
                    (onChange)="onProjectChange()" optionLabel="nombre" placeholder="Seleccionar Proyecto" dataKey="id"
                optionValue="id"
                    appendTo="body" styleClass="w-full" [filter]="true" filterBy="nombre">
                </p-select>
              <small class="p-error block mt-1" *ngIf="submitted && !selectedProjectId">
                    El proyecto es requerido.
                </small>
            </div>

            <div class="formgrid grid">
                <label for="task" class="font-bold">Tarea</label>
              <p-select id="task" [options]="tasks" [(ngModel)]="selectedTaskId" optionLabel="nombre" optionValue="id"
                [disabled]="!selectedProjectId" [loading]="loadingTasks"
                [placeholder]="selectedProjectId ? 'Seleccionar tarea' : 'Seleccione primero un proyecto'"
                (onChange)="syncRecordTaskSelection()"
                    [showClear]="true" dataKey="id" appendTo="body" styleClass="w-full" [filter]="true"
                    filterBy="nombre">

                    <ng-template let-item pTemplate="item">
                        <span>{{ item.nombre }}</span>
                    </ng-template>

                </p-select>
            </div>

            <div class="formgrid grid">
              <div class="field col-6 mb-0">
                    <label class="font-bold">Usuario</label>
                    <input pInputText [value]="record.id_trabajador.dni" [disabled]="true" class="w-full surface-200" />
                    <small class="text-500">Campo no editable</small>
                </div>
            </div>

            <div class="field mb-0">
                <label class="font-bold">Fecha</label>
              <p-datepicker [(ngModel)]="record.fecha" [disabled]="false" dateFormat="dd/mm/yy" [showIcon]="true"
                    appendTo="body" styleClass="w-full surface-200" inputStyleClass="w-full"></p-datepicker>
            </div>

            <p-divider></p-divider>

            <div class="field mb-0">
                <label for="horas" class="font-bold">Horas Imputadas</label>
                <p-inputNumber id="horas" [(ngModel)]="record.horas" [min]="0" [max]="24" [minFractionDigits]="1"
                    [maxFractionDigits]="2" [showButtons]="true" buttonLayout="horizontal"
                    inputStyleClass="text-center font-bold" styleClass="w-full"
                    decrementButtonClass="p-button-secondary" incrementButtonClass="p-button-secondary"
                    incrementButtonIcon="pi pi-plus" decrementButtonIcon="pi pi-minus" suffix=" h">
                </p-inputNumber>
            </div>

            <div class="field flex align-items-center gap-2 mt-2 border-1 surface-border border-round p-3">
                <p-checkbox [(ngModel)]="record.validado" [binary]="true" inputId="validado"></p-checkbox>
                <label for="validado" class="font-bold cursor-pointer select-none m-0">Registro Validado</label>
            </div>

        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
                (click)="hideDialog()"></button>
            <button pButton pRipple label="Guardar Cambios" icon="pi pi-check" severity="success"
                (click)="saveRecord()"></button>
        </div>
    </ng-template>
</p-dialog>
