<p-toast></p-toast>
<p-confirmDialog appendTo="body"></p-confirmDialog>

<h3 class="m-0 text-900 font-bold mb-4">Jornadas No Validadas</h3>
<p-table
  #dt
  [value]="records"
  [lazy]="true"
  (onLazyLoad)="loadRecords($event)"
  [totalRecords]="totalRecords"
  [loading]="loading"
  [rows]="10"
  [paginator]="true"
  [rowsPerPageOptions]="[5,10,20]"
  [tableStyle]="{ 'min-width': '60rem' }"
  styleClass="p-datatable-striped"
  dataKey="id"
>
  <ng-template pTemplate="header">
    <tr>
      <th style="width:15%">Fecha</th>
      <th style="width:10%">Horas</th>
      <th style="width:30%">Tarea</th>
      <th style="width:25%">Usuario</th>
      <th style="width:20%; text-align:center">Acciones</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-r>
    <tr>
      <td>{{ r.fecha | date:'dd/MM/yyyy' }}</td>
      <td><span class="font-bold">{{ r.horas }} h</span></td>
      <td><i class="pi pi-check-square mr-2 text-500"></i>{{ r.id_tarea?.nombre }}</td>
      <td><i class="pi pi-user mr-2 text-500"></i>{{ r.id_trabajador?.dni }}</td>
      <td class="text-center">
        <div class="flex gap-2 justify-content-center">
          <p-button
            icon="pi pi-check-circle"
            [rounded]="true"
            [text]="true"
            severity="success"
            pTooltip="Validar jornada"
            tooltipPosition="bottom"
            (click)="confirmarAccion('validar', r)"
          ></p-button>

          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            pTooltip="Eliminar jornada"
            tooltipPosition="bottom"
            (click)="confirmarAccion('eliminar', r)"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
